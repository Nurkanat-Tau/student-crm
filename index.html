<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Lesson Calendar</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#f7f7f5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Lessons">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  color-scheme: light;
  --bg:#f7f7f5; --card:#fff; --ink:#1a1a18; --muted:#6f6f69;
  --line:#e4e4df;
  --green:#2f7a4f; --greenbg:#e7f4ec; --greenline:#bfe0cd;
  --amber:#8f6412; --amberbg:#fdf3e0; --amberline:#f0dcb4;
  --grey:#8a8a84; --greybg:#f1f0ed;
  --blue:#2f5d8a; --bluebg:#eaf1f8; --blueline:#c6dbee;
  --red:#a63a35;
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);
  font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
  -webkit-text-size-adjust:100%}
h1,h2{margin:0;font-weight:600;letter-spacing:-.01em}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font:inherit;color:inherit;background:#fff;border:1px solid var(--line);
  border-radius:8px;padding:9px 10px;width:100%}
input:focus,select:focus{outline:2px solid var(--ink);outline-offset:-1px}
label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--muted);margin-bottom:5px}

.wrap{max-width:1240px;margin:0 auto;padding:16px 16px 70px}
.top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.top h1{font-size:19px}
.sp{flex:1}
.btn{background:var(--ink);color:#fff;padding:9px 15px;border-radius:8px;font-weight:600;font-size:13px}
.btn:active{opacity:.8}
.btn.g{background:#fff;color:var(--ink);border:1px solid var(--line);font-weight:500}
.btn.sm{padding:6px 11px;font-size:12px}
.btn.wide{display:block;width:100%;text-align:center;padding:12px}
.btn.ok{background:var(--green)}
.btn.grey{background:var(--grey)}
.btn.no{background:#fff;color:var(--red);border:1px solid #eccecb}
.nav{display:flex;align-items:center;gap:4px}
.nav button{width:34px;height:34px;border:1px solid var(--line);background:#fff;border-radius:8px;
  font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center}
.wklabel{font-weight:600;min-width:160px;text-align:center;font-size:14px}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 14px}
.stat .k{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700}
.stat .v{font-size:21px;font-weight:700;margin-top:2px;letter-spacing:-.02em}
.stat .n{font-size:11.5px;color:var(--muted)}
.stat.warn{background:var(--amberbg);border-color:var(--amberline)}
.stat.warn .v{color:var(--amber)}

.cal{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.calhead{display:grid;border-bottom:1px solid var(--line);background:#fbfbfa}
.calhead .hcell{padding:9px 6px;text-align:center;border-left:1px solid var(--line)}
.calhead .hcell:first-child{border-left:none}
.calhead .dn{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700}
.calhead .dd{font-size:17px;font-weight:600;margin-top:1px}
.calhead .hcell.today .dd{background:var(--ink);color:#fff;border-radius:50%;
  width:29px;height:29px;line-height:29px;display:inline-block;font-size:15px}
.calbody{display:grid;position:relative}
.gutter{border-right:1px solid var(--line);background:#fbfbfa}
.gutter .h{height:58px;font-size:11px;color:var(--muted);text-align:right;
  padding:2px 7px 0 4px;font-variant-numeric:tabular-nums}
.col{position:relative;border-left:1px solid var(--line)}
.col .h{height:58px;border-bottom:1px solid #f2f1ee}
.col.weekend{background:#fcfbf9}
.col.todaycol{background:#fdfcf7}

.ev{position:absolute;border-radius:8px;padding:5px 7px;overflow:hidden;
  font-size:12px;line-height:1.25;cursor:pointer;border:1px solid}
.ev .nm{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev .mt{font-size:10.5px;opacity:.85;font-variant-numeric:tabular-nums;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev.planned{background:var(--bluebg);border-color:var(--blueline);color:var(--blue)}
.ev.attended{background:var(--greenbg);border-color:var(--greenline);color:var(--green)}
.ev.unpaid{background:var(--amberbg);border-color:var(--amberline);color:var(--amber)}
.ev.missed{background:var(--greybg);border-color:var(--line);color:var(--grey)}
.ev.missed .nm{text-decoration:line-through}
.ev.due{box-shadow:0 0 0 2px #eab86a}

.nowline{position:absolute;left:0;right:0;height:2px;background:#d2503f;z-index:5;pointer-events:none}
.nowline::before{content:'';position:absolute;left:-4px;top:-3px;width:8px;height:8px;
  border-radius:50%;background:#d2503f}

.legend{display:flex;gap:14px;flex-wrap:wrap;margin:11px 2px 0;font-size:12px;color:var(--muted)}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}

.scrim{position:fixed;inset:0;background:rgba(20,20,18,.4);display:none;z-index:60;
  align-items:center;justify-content:center;padding:16px}
.scrim.on{display:flex}
.modal{background:var(--bg);border-radius:14px;width:100%;max-width:430px;max-height:88vh;
  overflow-y:auto;box-shadow:0 18px 44px rgba(0,0,0,.2)}
.mhead{padding:16px 18px 12px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:10px}
.mhead h2{font-size:17px}
.mhead .sub{font-size:12.5px;color:var(--muted);margin-top:2px}
.x{font-size:22px;line-height:1;color:var(--muted);padding:0 6px;border-radius:6px}
.mbody{padding:16px 18px 20px;display:flex;flex-direction:column;gap:11px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hint{font-size:12px;color:var(--muted)}
.sep{height:1px;background:var(--line);margin:3px 0}

.chk{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);
  border-radius:10px;padding:12px 13px;cursor:pointer;font-weight:600}
.chk.on{background:var(--greenbg);border-color:var(--greenline);color:var(--green)}
.box{width:21px;height:21px;border-radius:6px;border:2px solid #c9c8c3;display:flex;
  align-items:center;justify-content:center;font-size:13px;color:#fff;flex:0 0 auto}
.chk.on .box{background:var(--green);border-color:var(--green)}

.slist{display:flex;flex-direction:column;gap:9px}
.scard{background:#fff;border:1px solid var(--line);border-radius:11px;padding:12px 13px}
.scard .r1{display:flex;align-items:center;gap:8px}
.scard .nm{font-weight:700;flex:1;min-width:0}
.scard .pr{font-variant-numeric:tabular-nums;font-size:13px;color:var(--muted)}
.scard .r2{margin-top:6px;font-size:12.5px;color:var(--muted);display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.slot{background:var(--bluebg);color:var(--blue);border-radius:6px;padding:1px 7px;font-weight:600;font-size:11.5px}
.owe{color:var(--amber);font-weight:700}
.mini{color:#b9b8b3;font-size:18px;padding:0 5px;line-height:1}
.empty{text-align:center;color:var(--muted);padding:26px 10px;font-size:13px}
.dayswitch{display:flex;gap:5px}
.dayswitch button{border:1px solid var(--line);background:#fff;border-radius:8px;
  padding:8px 0;font-size:12px;font-weight:600;flex:1;min-width:0}
.dayswitch button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.viewtoggle{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.viewtoggle button{padding:7px 12px;font-size:12.5px;background:#fff;font-weight:600}
.viewtoggle button.on{background:var(--ink);color:#fff}
@media(max-width:700px){
  .wrap{padding:12px 10px 70px}
  .top h1{font-size:17px;width:100%}
  .stats{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>Lesson Calendar</h1>
    <span class="sp"></span>
    <div class="viewtoggle"><button id="vWeek">Week</button><button id="vDay">Day</button></div>
    <button class="btn g sm" id="studentsBtn">Students</button>
    <button class="btn sm" id="addBtn">+ Lesson</button>
  </div>

  <div class="top" style="margin-bottom:12px">
    <div class="nav">
      <button id="prev">&#8249;</button>
      <div class="wklabel" id="wklabel"></div>
      <button id="next">&#8250;</button>
    </div>
    <button class="btn g sm" id="todayBtn">Today</button>
    <span class="sp"></span>
    <button class="btn g sm" id="monthBtn">Month</button>
    <button class="btn g sm" id="moreBtn">Money</button>
  </div>

  <div class="stats" id="stats"></div>
  <div class="cal" id="cal"></div>
  <div class="legend">
    <span><span class="dot" style="background:#2f5d8a"></span>Planned</span>
    <span><span class="dot" style="background:#2f7a4f"></span>Attended &amp; paid</span>
    <span><span class="dot" style="background:#8f6412"></span>Owes money</span>
    <span><span class="dot" style="background:#8a8a84"></span>Didn't come</span>
    <span class="sp"></span>
    <span>Tap a lesson to mark it</span>
  </div>
</div>

<div class="scrim" id="scrim"><div class="modal" id="modal"></div></div>
<input type="file" id="fileIn" accept="application/json" style="display:none">

<script>
'use strict';
var KEY='tutor-cal-v1';
var DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
var DAYSFULL=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
var HOUR=58;
function uid(){return Math.random().toString(36).slice(2,9);}
var db={students:[],marks:{},extras:[]};
var anchor=new Date(), view='week', dayIdx=0;

/* ---------- storage ---------- */
function load(){
  try{var r=localStorage.getItem(KEY); if(r) db=JSON.parse(r);}catch(e){}
  db.students=db.students||[]; db.marks=db.marks||{}; db.extras=db.extras||[];
  if(!db.students.length) seed();
}
function save(){ try{localStorage.setItem(KEY,JSON.stringify(db));}catch(e){} }
function seed(){
  db.students=[
    {id:uid(),name:'Aigerim',price:5000,slots:[{d:1,t:'15:00'},{d:4,t:'15:00'}]},
    {id:uid(),name:'Daniyar',price:6000,slots:[{d:1,t:'17:00'},{d:3,t:'17:00'}]},
    {id:uid(),name:'Alua',price:5000,slots:[{d:2,t:'16:00'},{d:5,t:'16:00'}]}
  ];
  save();
}

/* ---------- dates ---------- */
function iso(d){var x=new Date(d);
  return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');}
function mondayOf(d){var x=new Date(d);x.setHours(0,0,0,0);
  var w=(x.getDay()+6)%7;x.setDate(x.getDate()-w);return x;}
function addDays(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return x;}
function todayISO(){return iso(new Date());}
function mins(t){var p=String(t).split(':');return (+p[0])*60+(+p[1]||0);}
function nowMins(){var n=new Date();return n.getHours()*60+n.getMinutes();}
function fmtRange(a,b){
  var mo=function(d){return d.toLocaleDateString('en-GB',{month:'short'});};
  var same=a.getMonth()===b.getMonth();
  return a.getDate()+(same?'':' '+mo(a))+' – '+b.getDate()+' '+mo(b);
}

/* ---------- money ---------- */
function T(n){return Math.round(n||0).toLocaleString('ru-RU').replace(/ /g,' ')+' ₸';}

/* ---------- occurrences ---------- */
function mkKey(date,sid,t){return date+'|'+sid+'|'+t;}
function occForDate(dateISO){
  var wd=((new Date(dateISO+'T00:00:00').getDay())+6)%7+1;
  var out=[];
  db.students.forEach(function(s){
    (s.slots||[]).forEach(function(sl){
      if(sl.d===wd) out.push({date:dateISO,sid:s.id,time:sl.t,student:s});
    });
  });
  db.extras.forEach(function(e){
    if(e.date!==dateISO) return;
    var s=null;
    for(var i=0;i<db.students.length;i++) if(db.students[i].id===e.sid) s=db.students[i];
    if(!s) return;
    for(var j=0;j<out.length;j++) if(out[j].sid===e.sid&&out[j].time===e.time) return;
    out.push({date:dateISO,sid:e.sid,time:e.time,student:s,extra:true});
  });
  return out.map(function(o){
    var k=mkKey(o.date,o.sid,o.time);
    var m=db.marks[k]||null;
    o.key=k; o.mark=m;
    o.status=m?m.status:'planned';
    o.paid=m?!!m.paid:false;
    o.price=(m&&m.price!=null)?m.price:(o.student.price||0);
    return o;
  }).filter(function(o){return o.status!=='cancelled';})
    .sort(function(a,b){return mins(a.time)-mins(b.time);});
}
function weekDates(){
  var mon=mondayOf(anchor), out=[];
  for(var i=0;i<7;i++) out.push(iso(addDays(mon,i)));
  return out;
}

/* ---------- money maths ---------- */
function debtOf(sid){
  var sum=0,n=0;
  for(var k in db.marks){
    var m=db.marks[k];
    if(m.status==='attended'&&!m.paid&&k.split('|')[1]===sid){sum+=(m.price||0);n++;}
  }
  return {sum:sum,n:n};
}
function totalDebt(){
  var sum=0,n=0;
  db.students.forEach(function(s){var d=debtOf(s.id);sum+=d.sum;n+=d.n;});
  return {sum:sum,n:n};
}
function settle(sid){
  for(var k in db.marks){
    var m=db.marks[k];
    if(m.status==='attended'&&!m.paid&&k.split('|')[1]===sid) m.paid=true;
  }
  save();
}

/* ---------- stats ---------- */
function renderStats(){
  var dates=weekDates(), t=todayISO();
  var count=0,planned=0,earned=0,unmarked=0;
  dates.forEach(function(d){
    occForDate(d).forEach(function(o){
      if(o.status!=='missed') count++;
      if(o.status==='planned'){
        planned++;
        if(d<t||(d===t&&mins(o.time)+60<nowMins())) unmarked++;
      }
      if(o.status==='attended'&&o.paid) earned+=o.price;
    });
  });
  var debt=totalDebt();
  var cards=[
    ['Lessons this week',count,planned+' still to come',''],
    ['Collected this week',T(earned),'money received',''],
    ['Owed to you',T(debt.sum),debt.n+' unpaid lesson'+(debt.n===1?'':'s'),debt.sum>0?'warn':''],
    ['Needs marking',unmarked,'lessons already passed',unmarked>0?'warn':'']
  ];
  document.getElementById('stats').innerHTML=cards.map(function(c){
    return '<div class="stat '+c[3]+'"><div class="k">'+c[0]+'</div><div class="v">'+c[1]+
      '</div><div class="n">'+c[2]+'</div></div>';
  }).join('');
}

/* ---------- calendar ---------- */
function hourRange(){
  var lo=24,hi=0;
  db.students.forEach(function(s){(s.slots||[]).forEach(function(sl){
    var h=mins(sl.t)/60; if(h<lo)lo=h; if(h+1>hi)hi=h+1;});});
  db.extras.forEach(function(e){
    var h=mins(e.time)/60; if(h<lo)lo=h; if(h+1>hi)hi=h+1;});
  if(lo>hi){lo=9;hi=19;}
  lo=Math.max(6,Math.floor(lo)-1); hi=Math.min(23,Math.ceil(hi)+1);
  if(hi-lo<6) hi=Math.min(23,lo+6);
  return [lo,hi];
}
function cls(o){
  if(o.status==='missed') return 'missed';
  if(o.status==='attended') return o.paid?'attended':'unpaid';
  return 'planned';
}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

function render(){
  renderStats();
  var hr=hourRange(), lo=hr[0], hi=hr[1];
  var all=weekDates(), t=todayISO();
  var dates = view==='week' ? all : [all[dayIdx]];
  var grid='grid-template-columns:52px repeat('+dates.length+',minmax(0,1fr))';

  var head='<div class="calhead" style="'+grid+'"><div class="hcell"></div>';
  dates.forEach(function(d){
    var dt=new Date(d+'T00:00:00'), wd=all.indexOf(d);
    head+='<div class="hcell'+(d===t?' today':'')+'"><div class="dn">'+DAYS[wd]+
      '</div><div class="dd">'+dt.getDate()+'</div></div>';
  });
  head+='</div>';

  var body='<div class="calbody" style="'+grid+'"><div class="gutter">';
  for(var h=lo;h<hi;h++) body+='<div class="h">'+String(h).padStart(2,'0')+':00</div>';
  body+='</div>';

  dates.forEach(function(d){
    var wd=all.indexOf(d);
    body+='<div class="col'+(wd>=5?' weekend':'')+(d===t?' todaycol':'')+'" data-date="'+d+'">';
    for(var h=lo;h<hi;h++) body+='<div class="h" data-h="'+h+'"></div>';
    var evs=occForDate(d), lanes=[];
    evs.forEach(function(o){
      var st=mins(o.time), en=st+60, li=-1;
      for(var i=0;i<lanes.length;i++){ if(lanes[i]<=st){li=i;break;} }
      if(li<0) li=lanes.length;
      lanes[li]=en; o._lane=li;
    });
    var L=Math.max(1,lanes.length);
    evs.forEach(function(o){
      var top=(mins(o.time)/60-lo)*HOUR;
      var w=100/L, left=o._lane*w;
      var passed=(d<t)||(d===t&&mins(o.time)+60<nowMins());
      var due=o.status==='planned'&&passed;
      var extra='';
      if(o.status==='attended'&&!o.paid) extra=' · not paid';
      else if(o.status==='attended') extra=' · paid';
      else if(o.status==='missed') extra=' · missed';
      body+='<div class="ev '+cls(o)+(due?' due':'')+'" data-date="'+o.date+'" data-sid="'+o.sid+
        '" data-time="'+o.time+'" style="top:'+top+'px;height:'+(HOUR-2)+'px;left:calc('+left+
        '% + 2px);width:calc('+w+'% - 4px)"><div class="nm">'+esc(o.student.name)+
        '</div><div class="mt">'+o.time+' · '+T(o.price)+extra+'</div></div>';
    });
    if(d===t){
      var nm=nowMins();
      if(nm/60>=lo&&nm/60<=hi) body+='<div class="nowline" style="top:'+((nm/60-lo)*HOUR)+'px"></div>';
    }
    body+='</div>';
  });
  body+='</div>';

  document.getElementById('cal').innerHTML=head+body;
  var mon=mondayOf(anchor);
  document.getElementById('wklabel').textContent = view==='week'
    ? fmtRange(mon,addDays(mon,6))
    : new Date(dates[0]+'T00:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'});
  document.getElementById('vWeek').classList.toggle('on',view==='week');
  document.getElementById('vDay').classList.toggle('on',view==='day');
}

/* ---------- modal ---------- */
var scrim=document.getElementById('scrim'), modal=document.getElementById('modal');
function openModal(html){modal.innerHTML=html;scrim.classList.add('on');}
function closeModal(){scrim.classList.remove('on');modal.innerHTML='';modal.onclick=null;}
scrim.onclick=function(e){if(e.target===scrim)closeModal();};
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});

function lessonModal(date,sid,time){
  var s=null;
  for(var i=0;i<db.students.length;i++) if(db.students[i].id===sid) s=db.students[i];
  if(!s) return;
  var k=mkKey(date,sid,time), m=db.marks[k]||{};
  var st=m.status||'planned', paid=!!m.paid;
  var price=(m.price!=null)?m.price:(s.price||0);
  var d=new Date(date+'T00:00:00');
  var dt=debtOf(sid);
  openModal(
    '<div class="mhead"><div style="flex:1"><h2>'+esc(s.name)+'</h2><div class="sub">'+
      DAYSFULL[(d.getDay()+6)%7]+', '+d.toLocaleDateString('en-GB',{day:'numeric',month:'long'})+
      ' · '+time+' · '+T(price)+'</div></div><button class="x" data-act="close">&times;</button></div>'+
    '<div class="mbody">'+
      '<div class="two">'+
        '<button class="btn '+(st==='attended'?'ok':'g')+'" data-act="att">'+(st==='attended'?'✓ ':'')+'Came</button>'+
        '<button class="btn '+(st==='missed'?'grey':'g')+'" data-act="miss">'+(st==='missed'?'✓ ':'')+'Didn\'t come</button>'+
      '</div>'+
      (st==='attended'
        ? '<div class="chk '+(paid?'on':'')+'" data-act="paid"><div class="box">'+(paid?'✓':'')+
          '</div><div style="flex:1">'+(paid?'Paid '+T(price):'Not paid yet — '+T(price))+'</div></div>'
        : '')+
      (dt.sum>0
        ? '<div class="hint">'+esc(s.name)+' owes <b class="owe">'+T(dt.sum)+'</b> in total ('+dt.n+
          ' lesson'+(dt.n===1?'':'s')+')<br><button class="btn g sm" data-act="settle" style="margin-top:7px">Mark everything paid</button></div>'
        : '')+
      '<div class="sep"></div>'+
      '<button class="btn no wide" data-act="cancel">Cancel this lesson</button>'+
      (st!=='planned'?'<button class="btn g wide" data-act="reset">Clear the mark</button>':'')+
    '</div>');
  modal.onclick=function(e){
    var b=e.target.closest('[data-act]'); if(!b) return;
    var a=b.dataset.act, cm=db.marks[k]||{};
    if(a==='close') return closeModal();
    if(a==='att') db.marks[k]={status:'attended',paid:!!cm.paid,price:price};
    if(a==='miss') db.marks[k]={status:'missed',paid:false,price:price};
    if(a==='paid') db.marks[k]={status:'attended',paid:!cm.paid,price:price};
    if(a==='cancel') db.marks[k]={status:'cancelled',price:price};
    if(a==='reset') delete db.marks[k];
    if(a==='settle') settle(sid);
    save(); render();
    if(a==='cancel'||a==='reset') closeModal(); else lessonModal(date,sid,time);
  };
}

function addLessonModal(date,hour){
  if(!db.students.length) return studentsModal();
  var d=date||todayISO();
  var t=(hour!=null)?String(hour).padStart(2,'0')+':00':'15:00';
  openModal(
    '<div class="mhead"><div style="flex:1"><h2>Add a lesson</h2>'+
      '<div class="sub">One time only — it will not repeat</div></div>'+
      '<button class="x" data-act="close">&times;</button></div>'+
    '<div class="mbody">'+
      '<div><label>Student</label><select id="aS">'+
        db.students.map(function(s){return '<option value="'+s.id+'">'+esc(s.name)+' — '+T(s.price)+'</option>';}).join('')+
      '</select></div>'+
      '<div class="two"><div><label>Date</label><input id="aD" type="date" value="'+d+'"></div>'+
      '<div><label>Time</label><input id="aT" type="time" value="'+t+'" step="300"></div></div>'+
      '<button class="btn wide" data-act="save">Add lesson</button>'+
    '</div>');
  modal.onclick=function(e){
    var b=e.target.closest('[data-act]'); if(!b) return;
    if(b.dataset.act==='close') return closeModal();
    var sid=document.getElementById('aS').value;
    var dd=document.getElementById('aD').value, tt=document.getElementById('aT').value;
    if(!dd||!tt) return;
    db.extras.push({id:uid(),date:dd,sid:sid,time:tt});
    save(); anchor=new Date(dd+'T00:00:00');
    dayIdx=(new Date(dd+'T00:00:00').getDay()+6)%7;
    render(); closeModal();
  };
}

function studentsModal(){
  openModal(
    '<div class="mhead"><div style="flex:1"><h2>Students</h2>'+
      '<div class="sub">Name, price per lesson, weekly times</div></div>'+
      '<button class="x" data-act="close">&times;</button></div>'+
    '<div class="mbody"><div class="slist">'+
      (db.students.length?db.students.map(function(s){
        var dt=debtOf(s.id);
        var slots=(s.slots||[]).slice().sort(function(a,b){return a.d-b.d||mins(a.t)-mins(b.t);});
        return '<div class="scard"><div class="r1"><div class="nm">'+esc(s.name)+'</div>'+
          '<div class="pr">'+T(s.price)+'</div>'+
          '<button class="mini" data-act="edit" data-id="'+s.id+'">✎</button>'+
          '<button class="mini" data-act="del" data-id="'+s.id+'">×</button></div>'+
          '<div class="r2">'+(slots.length
            ? slots.map(function(x){return '<span class="slot">'+DAYS[x.d-1]+' '+x.t+'</span>';}).join('')
            : '<span>no weekly times yet</span>')+
          (dt.sum>0?'<span class="owe">owes '+T(dt.sum)+'</span>':'')+'</div></div>';
      }).join(''):'<div class="empty">No students yet.</div>')+
    '</div><button class="btn wide" data-act="new">+ New student</button></div>');
  modal.onclick=function(e){
    var b=e.target.closest('[data-act]'); if(!b) return;
    var a=b.dataset.act;
    if(a==='close') return closeModal();
    if(a==='new') return editStudent(null);
    if(a==='edit') return editStudent(b.dataset.id);
    if(a==='del'){
      var s=null;
      for(var i=0;i<db.students.length;i++) if(db.students[i].id===b.dataset.id) s=db.students[i];
      if(s&&confirm('Delete '+s.name+'?')){
        db.students=db.students.filter(function(x){return x.id!==b.dataset.id;});
        save(); render(); studentsModal();
      }
    }
  };
}

function editStudent(id){
  var base={id:uid(),name:'',price:5000,slots:[]};
  if(id) for(var i=0;i<db.students.length;i++) if(db.students[i].id===id) base=db.students[i];
  var draft={id:base.id,name:base.name,price:base.price,
    slots:(base.slots||[]).map(function(x){return {d:x.d,t:x.t};})};
  var pickDay=null;

  function paint(){
    var slotHtml = draft.slots.length
      ? draft.slots.map(function(x,i){
          return '<div class="scard" style="padding:9px 11px"><div class="r1">'+
            '<div class="nm" style="font-weight:600">'+DAYSFULL[x.d-1]+' · '+x.t+'</div>'+
            '<button class="mini" data-act="rm" data-i="'+i+'">×</button></div></div>';}).join('')
      : '<div class="hint">No times yet — pick a day below, set the time, then press Add.</div>';
    openModal(
      '<div class="mhead"><div style="flex:1"><h2>'+(id?'Edit student':'New student')+'</h2></div>'+
        '<button class="x" data-act="close">&times;</button></div>'+
      '<div class="mbody">'+
        '<div class="two"><div><label>Name</label><input id="eN" value="'+esc(draft.name)+'" placeholder="Aigerim"></div>'+
        '<div><label>Price per lesson (₸)</label><input id="eP" type="number" min="0" step="500" value="'+(draft.price||'')+'"></div></div>'+
        '<div class="sep"></div>'+
        '<div><label>Weekly lesson times</label><div class="slist" style="gap:6px">'+slotHtml+'</div></div>'+
        '<div class="dayswitch">'+DAYS.map(function(d,i){
          return '<button data-act="day" data-d="'+(i+1)+'" class="'+(pickDay===i+1?'on':'')+'">'+d+'</button>';}).join('')+'</div>'+
        '<div class="two"><div><label>Time</label><input id="eT" type="time" value="15:00" step="300"></div>'+
        '<div><label>&nbsp;</label><button class="btn g wide" data-act="addslot">Add time</button></div></div>'+
        '<div class="sep"></div>'+
        '<button class="btn wide" data-act="save">Save</button>'+
      '</div>');
    var savedTime=null;
    modal.onclick=function(e){
      var b=e.target.closest('[data-act]'); if(!b) return;
      var a=b.dataset.act;
      draft.name=document.getElementById('eN').value;
      draft.price=+document.getElementById('eP').value||0;
      savedTime=document.getElementById('eT').value;
      if(a==='close') return studentsModal();
      if(a==='day'){
        pickDay=+b.dataset.d;
        var btns=modal.querySelectorAll('[data-act="day"]');
        for(var i=0;i<btns.length;i++) btns[i].classList.toggle('on',+btns[i].dataset.d===pickDay);
        return;
      }
      if(a==='rm'){draft.slots.splice(+b.dataset.i,1);paint();return;}
      if(a==='addslot'){
        if(!pickDay){alert('Pick a day of the week first.');return;}
        if(!savedTime) return;
        var dup=false;
        for(var j=0;j<draft.slots.length;j++)
          if(draft.slots[j].d===pickDay&&draft.slots[j].t===savedTime) dup=true;
        if(!dup) draft.slots.push({d:pickDay,t:savedTime});
        paint();
        var el=document.getElementById('eT'); if(el) el.value=savedTime;
        return;
      }
      if(a==='save'){
        if(!draft.name.trim()){alert('Please write a name.');return;}
        var ex=null;
        for(var m=0;m<db.students.length;m++) if(db.students[m].id===draft.id) ex=db.students[m];
        if(ex){ex.name=draft.name.trim();ex.price=draft.price;ex.slots=draft.slots;}
        else db.students.push({id:draft.id,name:draft.name.trim(),price:draft.price,slots:draft.slots});
        save(); render(); studentsModal();
      }
    };
  }
  paint();
}

/* ---------- monthly summary ---------- */
var monthCur=null;
function monthKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function monthStats(ym){
  var per={}, lessons=0, earned=0, unpaid=0, missed=0;
  for(var k in db.marks){
    if(k.slice(0,7)!==ym) continue;
    var m=db.marks[k], sid=k.split('|')[1];
    if(m.status==='missed'){missed++;continue;}
    if(m.status!=='attended') continue;
    lessons++;
    if(!per[sid]) per[sid]={n:0,earned:0,unpaid:0};
    per[sid].n++;
    if(m.paid){earned+=(m.price||0);per[sid].earned+=(m.price||0);}
    else{unpaid+=(m.price||0);per[sid].unpaid+=(m.price||0);}
  }
  return {per:per,lessons:lessons,earned:earned,unpaid:unpaid,missed:missed};
}
function monthModal(){
  if(!monthCur) monthCur=new Date();
  var ym=monthKey(monthCur), s=monthStats(ym);
  var label=monthCur.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  var rows=Object.keys(s.per).map(function(sid){
    var st=null;
    for(var i=0;i<db.students.length;i++) if(db.students[i].id===sid) st=db.students[i];
    return {name:st?st.name:'(deleted)',v:s.per[sid]};
  }).sort(function(a,b){return (b.v.earned+b.v.unpaid)-(a.v.earned+a.v.unpaid);});
  openModal(
    '<div class="mhead"><div style="flex:1"><h2>Monthly total</h2>'+
      '<div class="sub">Only lessons you have marked are counted</div></div>'+
      '<button class="x" data-act="close">&times;</button></div>'+
    '<div class="mbody">'+
      '<div class="top" style="margin:0"><div class="nav"><button data-act="pm">&#8249;</button>'+
        '<div class="wklabel">'+label+'</div><button data-act="nm">&#8250;</button></div></div>'+
      '<div class="stats" style="margin:0">'+
        '<div class="stat"><div class="k">Earned</div><div class="v">'+T(s.earned)+'</div><div class="n">money received</div></div>'+
        '<div class="stat '+(s.unpaid>0?'warn':'')+'"><div class="k">Still unpaid</div><div class="v">'+T(s.unpaid)+'</div><div class="n">from this month</div></div>'+
        '<div class="stat"><div class="k">Lessons held</div><div class="v">'+s.lessons+'</div><div class="n">'+s.missed+' missed</div></div>'+
        '<div class="stat"><div class="k">Total value</div><div class="v">'+T(s.earned+s.unpaid)+'</div><div class="n">earned + unpaid</div></div>'+
      '</div>'+
      (rows.length
        ? '<div class="slist">'+rows.map(function(r){
            return '<div class="scard"><div class="r1"><div class="nm">'+esc(r.name)+'</div>'+
              '<div class="pr">'+T(r.v.earned+r.v.unpaid)+'</div></div>'+
              '<div class="r2"><span>'+r.v.n+' lesson'+(r.v.n===1?'':'s')+'</span>'+
              (r.v.unpaid>0?'<span class="owe">'+T(r.v.unpaid)+' unpaid</span>':'<span>all paid</span>')+
              '</div></div>';}).join('')+'</div>'
        : '<div class="empty">Nothing marked in this month yet.</div>')+
    '</div>');
  modal.onclick=function(e){
    var b=e.target.closest('[data-act]'); if(!b) return;
    var a=b.dataset.act;
    if(a==='close') return closeModal();
    if(a==='pm'){monthCur=new Date(monthCur.getFullYear(),monthCur.getMonth()-1,1);return monthModal();}
    if(a==='nm'){monthCur=new Date(monthCur.getFullYear(),monthCur.getMonth()+1,1);return monthModal();}
  };
}

function backupFile(){
  return new File([JSON.stringify(db,null,2)],'lessons-backup-'+todayISO()+'.json',{type:'application/json'});
}
function shareBackup(){
  var f=backupFile();
  if(navigator.canShare&&navigator.canShare({files:[f]})){
    navigator.share({files:[f],title:'Lesson calendar backup'}).catch(function(){});
  }else{
    var el=document.createElement('a');
    el.href=URL.createObjectURL(f); el.download=f.name; el.click();
    URL.revokeObjectURL(el.href);
  }
}

function moneyModal(){
  var d=totalDebt();
  var owing=db.students.map(function(s){return {s:s,d:debtOf(s.id)};})
    .filter(function(x){return x.d.sum>0;});
  openModal(
    '<div class="mhead"><div style="flex:1"><h2>Money</h2></div>'+
      '<button class="x" data-act="close">&times;</button></div>'+
    '<div class="mbody">'+
      '<div class="stat warn"><div class="k">Total owed to you</div><div class="v">'+T(d.sum)+
        '</div><div class="n">'+d.n+' unpaid lesson'+(d.n===1?'':'s')+'</div></div>'+
      (owing.length
        ? '<div class="slist">'+owing.map(function(x){
            return '<div class="scard"><div class="r1"><div class="nm">'+esc(x.s.name)+'</div>'+
              '<div class="pr owe">'+T(x.d.sum)+'</div>'+
              '<button class="btn g sm" data-act="settle" data-id="'+x.s.id+'">Paid</button></div>'+
              '<div class="r2">'+x.d.n+' lesson'+(x.d.n===1?'':'s')+' unpaid</div></div>';}).join('')+'</div>'
        : '<div class="hint">Everyone has paid.</div>')+
      '<div class="sep"></div>'+
      '<button class="btn wide" data-act="share">Send to my other phone</button>'+
      '<button class="btn g wide" data-act="import">Open a backup file</button>'+
      '<div class="hint">Everything is stored inside this browser only. "Send to my other phone" gives you a file you can send through WhatsApp or Telegram, then open it on the other phone with the button above.</div>'+
    '</div>');
  modal.onclick=function(e){
    var b=e.target.closest('[data-act]'); if(!b) return;
    var a=b.dataset.act;
    if(a==='close') return closeModal();
    if(a==='settle'){settle(b.dataset.id); render(); moneyModal(); return;}
    if(a==='share'){shareBackup(); return;}
    if(a==='import') document.getElementById('fileIn').click();
  };
}
document.getElementById('fileIn').onchange=function(e){
  var f=e.target.files[0]; if(!f) return;
  var r=new FileReader();
  r.onload=function(){
    try{
      var o=JSON.parse(r.result);
      if(!o.students) throw new Error('bad');
      if(confirm('Replace everything with this backup?')){db=o;save();render();closeModal();}
    }catch(err){alert('That file is not a valid backup.');}
  };
  r.readAsText(f); e.target.value='';
};

/* ---------- events ---------- */
document.getElementById('cal').addEventListener('click',function(e){
  var ev=e.target.closest('.ev');
  if(ev) return lessonModal(ev.dataset.date,ev.dataset.sid,ev.dataset.time);
  var h=e.target.closest('.h[data-h]'), col=e.target.closest('.col');
  if(h&&col) addLessonModal(col.dataset.date,+h.dataset.h);
});
document.getElementById('prev').onclick=function(){
  if(view==='week') anchor=addDays(anchor,-7);
  else{ dayIdx--; if(dayIdx<0){dayIdx=6;anchor=addDays(anchor,-7);} }
  render();
};
document.getElementById('next').onclick=function(){
  if(view==='week') anchor=addDays(anchor,7);
  else{ dayIdx++; if(dayIdx>6){dayIdx=0;anchor=addDays(anchor,7);} }
  render();
};
document.getElementById('todayBtn').onclick=function(){
  anchor=new Date(); dayIdx=(new Date().getDay()+6)%7; render();
};
document.getElementById('vWeek').onclick=function(){view='week';render();};
document.getElementById('vDay').onclick=function(){view='day';render();};
document.getElementById('studentsBtn').onclick=studentsModal;
document.getElementById('addBtn').onclick=function(){addLessonModal(null,null);};
document.getElementById('moreBtn').onclick=moneyModal;
document.getElementById('monthBtn').onclick=function(){monthCur=new Date();monthModal();};

if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}

load();
dayIdx=(new Date().getDay()+6)%7;
if(window.innerWidth<700) view='day';
render();
setInterval(function(){ if(!scrim.classList.contains('on')) render(); },60000);
</script>
